<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Good Game - Standalone Edition</title>
    <style>
        /* Base Reset & Theme Style Setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1e1e24;
            color: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game-wrapper {
            width: 100%;
            max-width: 1000px;
            background-color: #252630;
            border: 2px solid #3a3b4c;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #3a3b4c;
            padding-bottom: 15px;
        }

        .game-title {
            font-size: 2.2rem;
            color: #fff;
        }

        .game-title span {
            color: #38ef7d;
        }

        /* Responsive Dual-Column Split */
        .game-layout {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .game-column {
            flex: 2;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-column {
            flex: 1;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Player Score HUD Statistics */
        .stats-panel {
            background-color: #2a2b36;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #3a3b4c;
            display: flex;
            justify-content: space-around;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .stat-val {
            color: #38ef7d;
        }

        /* Soccer Arena Field Render Box */
        .soccer-field {
            background-color: #2e7d32;
            border: 4px solid #fff;
            border-radius: 12px;
            height: 380px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.3);
            transition: background-color 0.5s;
        }

        .field-line {
            position: absolute;
            width: 50%;
            height: 100%;
            border-right: 2px solid rgba(255,255,255,0.4);
            left: 0;
            top: 0;
        }

        .center-circle {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .goal {
            position: absolute;
            width: 15px;
            height: 90px;
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid #222;
            top: 50%;
            transform: translateY(-50%);
        }
        .goal-left { left: 0; border-radius: 0 8px 8px 0; }
        .goal-right { right: 0; border-radius: 8px 0 0 8px; }

        .soccer-ball {
            position: absolute;
            font-size: 2rem;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: left 0.1s linear, top 0.1s linear;
            user-select: none;
        }

        .field-player {
            position: absolute;
            font-size: 1.1rem;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 8px;
            font-weight: 600;
            white-space: nowrap;
            transition: left 0.2s ease, top 0.2s ease;
            color: #fff;
        }

        /* Combat Trick Control Board */
        .action-tray {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .action-btn {
            background-color: #3a3b4c;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background-color: #35a7ff;
        }

        /* Point Upgrade Store Boxes */
        .panel-box {
            background-color: #2a2b36;
            border: 2px solid #3a3b4c;
            border-radius: 12px;
            padding: 15px;
        }

        .panel-title {
            font-size: 1.2rem;
            margin-bottom: 12px;
            border-bottom: 2px solid #3a3b4c;
            padding-bottom: 5px;
            color: #ff5964;
        }

        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #3a3b4c;
        }

        .shop-item:last-child {
            border-bottom: none;
        }

        .buy-btn {
            background-color: #ff5964;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .buy-btn:hover {
            background-color: #ff2a35;
        }

        .world-btn {
            width: 100%;
            background-color: #3a3b4c;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            text-align: left;
            display: flex;
            justify-content: space-between;
        }

        .world-btn.unlocked {
            border-left: 4px solid #38ef7d;
        }

        .game-status-alert {
            background: #35a7ff;
            color: white;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
            min-height: 38px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="game-header">
            <h1 class="game-title">⚽ <span>The Good Game</span> Standalone</h1>
        </div>

        <div id="game-alert" class="game-status-alert"></div>
        
        <div class="game-layout">
            <div class="game-column">
                <div class="stats-panel">
                    <div>Points: <span id="pts-display" class="stat-val">0</span></div>
                    <div>Wins: <span id="wins-display" class="stat-val">0</span></div>
                    <div>World: <span id="world-display" style="color: #35a7ff;">Normal Arena</span></div>
                </div>

                <div class="soccer-field" id="field-bg">
                    <div class="field-line"></div>
                    <div class="center-circle"></div>
                    <div class="goal goal-left"></div>
                    <div class="goal goal-right"></div>
                    
                    <div class="field-player" id="p1-node" style="top: 150px; left: 100px;">🚶 Player 1 (You)</div>
                    <div class="field-player" id="p2-node" style="top: 60px; left: 500px;">🏃 Rival 2</div>
                    <div class="field-player" id="p3-node" style="top: 260px; left: 450px;">🧍 Rival 3</div>
                    <div class="field-player" id="p4-node" style="top: 160px; left: 650px;">🧤 Goalie</div>

                    <div class="soccer-ball" id="ball-node" style="top: 170px; left: 380px;" onclick="playerKick()">⚽</div>
                </div>

                <div class="action-tray">
                    <button class="action-btn" onclick="triggerAction('Slap')">👋 Slap Dash</button>
                    <button class="action-btn" onclick="triggerAction('Clap')">👏 Clap Fake</button>
                    <button class="action-btn" onclick="triggerAction('Jump')">🦘 High Jump</button>
                    <button class="action-btn" onclick="triggerAction('Crouch')">🧘 Slide Crouch</button>
                </div>
            </div>

            <div class="menu-column">
                <div class="panel-box">
                    <div class="panel-title">🛒 Point Shop</div>
                    <div class="shop-item">
                        <span>🚀 Jetpack Skin</span>
                        <button class="buy-btn" onclick="buyItem(400, '🚀 Jetpack')">400 Pts</button>
                    </div>
                    <div class="shop-item">
                        <span>⭐ 3 Wins Bundle</span>
                        <button class="buy-btn" onclick="buyWins(150)">150 Pts</button>
                    </div>
                    <div class="shop-item">
                        <span>🌀 Portal Gun Skin</span>
                        <button class="buy-btn" onclick="buyItem(1000, '🌀 Portal')">1000 Pts</button>
                    </div>
                </div>

                <div class="panel-box">
                    <div class="panel-title">🌎 Unlock Worlds</div>
                    <button class="world-btn unlocked" id="w-normal" onclick="changeWorld('Normal Arena', '#2e7d32', 1)">
                        <span>🏟️ Normal Field</span><span>Active</span>
                    </button>
                    <button class="world-btn" id="w-candy" onclick="unlockWorld('Candy World', '#ff85a2', 300, 1.5, this)">
                        <span>🍬 Candy World (+1.5x)</span><span class="lock-cost">300 Pts</span>
                    </button>
                    <button class="world-btn" id="w-cheese" onclick="unlockWorld('Cheese World', '#ffcc00', 800, 2.0, this)">
                        <span>🧀 Cheese World (+2x)</span><span class="lock-cost">800 Pts</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let points = 0;
        let wins = 0;
        let currentBonus = 1;
        let playerEquipment = "🚶";

        const ball = document.getElementById('ball-node');
        const p1 = document.getElementById('p1-node');
        const p2 = document.getElementById('p2-node');
        const p3 = document.getElementById('p3-node');
        const p4 = document.getElementById('p4-node');

        function showStatus(msg) {
            const box = document.getElementById('game-alert');
            box.innerText = msg;
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 2500);
        }

        // Active Player Ball Kick Animations with 30% Success Rate
        function playerKick() {
            p1.style.left = "330px";
            p1.style.top = "170px";

            // Roll a 30% chance to score (0.0 to 0.3 means goal, above 0.3 means miss)
            let roll = Math.random();
            let isGoal = roll < 0.30;

            setTimeout(() => {
                if (isGoal) {
                    // Ball flies past goalie straight into the net
                    ball.style.left = "740px";
                    ball.style.top = "175px";
                    p4.style.top = "110px"; // Goalie jumps the wrong way
                    p2.style.left = "400px";

                    setTimeout(() => {
                        let gained = Math.round(100 * currentBonus);
                        points += gained;
                        wins += 1;
                        document.getElementById('pts-display').innerText = points;
                        document.getElementById('wins-display').innerText = wins;
                        showStatus(`⚽ GOAL!! You scored! +${gained} Points!`);
                        resetField();
                    }, 600);
                } else {
                    // Ball is blocked or kicked wide
                    ball.style.left = "640px";
                    ball.style.top = "165px";
                    p4.style.left = "620px"; // Goalie runs up and intercepts it
                    p4.style.top = "160px";

                    setTimeout(() => {
                        showStatus(`❌ SAVED! The goalie blocked your shot! (70% Miss Rate)`);
                        resetField();
                    }, 600);
                }
            }, 200);
        }

        // Action Menu Strategy Tricks
        function triggerAction(actionName) {
            showStatus(`✨ Performed ${actionName}! Tricking the defense...`);
            p1.style.left = "280px";
            p3.style.top = "300px"; 
            
            setTimeout(() => {
                playerKick();
            }, 400);
        }

        function resetField() {
            setTimeout(() => {
                ball.style.left = "380px";
                ball.style.top = "170px";
                p1.style.left = "100px";
                p1.style.top = "150px";
                p2.style.left = "500px";
                p2.style.top = "60px";
                p3.style.left = "450px";
                p3.style.top = "260px";
                p4.style.left = "650px";
                p4.style.top = "160px";
            }, 1000);
        }

        // Store Upgrades Engines
        function buyItem(cost, prefix) {
            if (points >= cost) {
                points -= cost;
                playerEquipment = prefix;
                document.getElementById('pts-display').innerText = points;
                p1.innerText = `${prefix} Player 1 (You)`;
                showStatus(`Successfully equipped ${prefix}! Looks legendary!`);
            } else {
                showStatus(`❌ Need ${cost} points! Keep scoring goals!`);
            }
        }

        function buyWins(cost) {
            if (points >= cost) {
                points -= cost;
                wins += 3;
                document.getElementById('pts-display').innerText = points;
                document.getElementById('wins-display').innerText = wins;
                showStatus("⭐ Added +3 Wins Bundle directly to your stats panel!");
            } else {
                showStatus(`❌ Need ${cost} points to buy wins bundle.`);
            }
        }

        // Map Selection Engine Functions
        function changeWorld(name, color, multiplier) {
            currentBonus = multiplier;
            document.getElementById('world-display').innerText = name;
            document.getElementById('field-bg').style.backgroundColor = color;
            showStatus(`Entered ${name}! Multiplier is now ${multiplier}x!`);
        }

        function unlockWorld(name, color, cost, multiplier, btn) {
            if (btn.classList.contains('unlocked')) {
                changeWorld(name, color, multiplier);
                return;
            }

            if (points >= cost) {
                points -= cost;
                document.getElementById('pts-display').innerText = points;
                btn.classList.add('unlocked');
                btn.style.borderLeft = "4px solid #38ef7d";
                btn.querySelector('.lock-cost').innerText = "Unlocked";
                changeWorld(name, color, multiplier);
            } else {
                showStatus(`🔒 You need ${cost} points to break into ${name}!`);
            }
        }
    </script>
</body>
</html>
